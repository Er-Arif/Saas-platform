name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: company
          POSTGRES_PASSWORD: company
          POSTGRES_DB: company_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U company"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e apps/api -e apps/gateway pytest
      - run: alembic upgrade head
      - run: pytest apps/api/tests apps/gateway/tests

